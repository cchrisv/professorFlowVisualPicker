<template>
    <lightning-modal-header label="Configure picker"></lightning-modal-header>

    <lightning-modal-body class="pflow-studio__body">
        <div class="pflow-studio" style={gridStyle}>
            <!-- ================================================================
                 LEFT PANEL · tab nav (top) + live preview (fills below)
                 ================================================================ -->
            <aside class="pflow-studio__left" aria-label="Navigation and preview">
                <nav class="pflow-studio__nav" aria-label="Configuration sections">
                    <template for:each={sections} for:item="s">
                        <button
                            key={s.key}
                            type="button"
                            class={s.buttonClass}
                            data-key={s.key}
                            data-chapter={s.key}
                            aria-current={s.ariaCurrent}
                            onclick={handleSectionClick}
                        >
                            <span class="pflow-studio__nav-stripe" aria-hidden="true"></span>
                            <span class="pflow-studio__nav-numeral" aria-hidden="true">{s.numeral}</span>
                            <span class="pflow-studio__nav-glyph" aria-hidden="true">
                                <lightning-icon icon-name={s.icon} size="x-small" alternative-text=""></lightning-icon>
                            </span>
                            <span class="pflow-studio__nav-label">{s.label}</span>
                            <template lwc:if={s.showStatus}>
                                <span class={s.statusClass} aria-hidden="true"></span>
                            </template>
                        </button>
                    </template>
                </nav>

                <div class="pflow-studio__preview" aria-label="Live preview">
                    <header class="pflow-studio__preview-head">
                        <div class="pflow-studio__preview-head-text">
                            <p class="slds-text-title_caps pflow-studio__eyebrow">Live preview</p>
                            <h3 class="slds-text-heading_small pflow-studio__preview-title">
                                {previewLayoutLabel} · {previewSelectionLabel}
                            </h3>
                        </div>
                        <!-- State toggles — set the picker's rendering state
                             (populated / empty / error) without having to
                             manipulate data sources. Lives in the preview so
                             the control sits next to the canvas it affects. -->
                        <div class="pflow-studio__preview-states" role="tablist" aria-label="Preview rendering state">
                            <template for:each={previewStateButtons} for:item="btn">
                                <button
                                    key={btn.state}
                                    type="button"
                                    role="tab"
                                    class="pflow-studio__preview-state"
                                    data-state={btn.state}
                                    aria-selected={btn.ariaPressed}
                                    aria-pressed={btn.ariaPressed}
                                    onclick={handlePreviewStateChange}
                                >
                                    <lightning-icon icon-name={btn.icon} size="xx-small" alternative-text=""></lightning-icon>
                                    <span>{btn.label}</span>
                                </button>
                            </template>
                        </div>
                    </header>

                    <div class="pflow-studio__preview-frame">
                        <template lwc:if={previewEmpty}>
                            <div class="pflow-studio__preview-empty">
                                <lightning-icon icon-name="utility:preview" size="small" alternative-text=""></lightning-icon>
                                <p class="slds-text-body_regular slds-text-color_weak">Pick a data source to see your picker come to life.</p>
                            </div>
                        </template>
                        <template lwc:elseif={showLivePreview}>
                            <c-pflow-organism-data-picker
                                label={_config.label}
                                help-text={_config.helpText}
                                field-level-help={_config.fieldLevelHelp}
                                forced-state={previewForcedState}
                                source-type={_config.dataSource}
                                layout={_config.layout}
                                selection-mode={_config.selectionMode}
                                required={_config.required}
                                min-selections={_config.minSelections}
                                max-selections={_config.maxSelections}
                                picklist-config={organismPicklistConfig}
                                sobject-config={organismSobjectConfig}
                                custom-config={organismCustomConfig}
                                string-collection-config={organismStringCollectionConfig}
                                overrides={organismOverrides}
                                display-config={organismDisplayConfig}
                                enable-search={_config.enableSearch}
                                show-select-all={_config.showSelectAll}
                                include-none-option={noneOptionValue}
                                none-option-label={noneOptionLabelValue}
                                none-option-position={noneOptionPositionValue}
                                grid-min-width={orgGridMinWidth}
                                gap-horizontal={orgGapHorizontal}
                                gap-vertical={orgGapVertical}
                                margin-top={orgMarginTop}
                                margin-right={orgMarginRight}
                                margin-bottom={orgMarginBottom}
                                margin-left={orgMarginLeft}
                                padding-top={orgPaddingTop}
                                padding-right={orgPaddingRight}
                                padding-bottom={orgPaddingBottom}
                                padding-left={orgPaddingLeft}
                                size={orgSize}
                                aspect-ratio={orgAspectRatio}
                                badge-position={orgBadgePosition}
                                badge-variant={orgBadgeVariant}
                                badge-shape={orgBadgeShape}
                                columns={orgColumns}
                                selection-indicator={orgSelectionIndicator}
                                elevation={orgElevation}
                                pattern={orgPattern}
                                pattern-tone={orgPatternTone}
                                corner-style={orgCornerStyle}
                                corner-tone={orgCornerTone}
                                surface-style={orgSurfaceStyle}
                                surface-tone={orgSurfaceTone}
                                icon-decor={orgIconDecor}
                                icon-shape={orgIconShape}
                                icon-style={orgIconStyle}
                                icon-shading={orgIconShading}
                                icon-tone={orgIconTone}
                                icon-tone-hex={orgIconToneHex}
                                pattern-tone-hex={orgPatternToneHex}
                                corner-tone-hex={orgCornerToneHex}
                                surface-tone-hex={orgSurfaceToneHex}
                                badge-variant-hex={orgBadgeVariantHex}
                                icon-glyph-tone={orgIconGlyphTone}
                                icon-glyph-tone-hex={orgIconGlyphToneHex}
                                icon-size={orgIconSize}
                                show-icons={orgShowIcons}
                                show-badges={orgShowBadges}
                                preview-mode="true"
                                empty-state-message={_config.emptyStateMessage}
                                error-state-message={_config.errorStateMessage}
                            ></c-pflow-organism-data-picker>
                        </template>
                        <template lwc:elseif={showFallbackPreview}>
                            <template lwc:if={_config.label}>
                                <h2 class="pflow-studio__preview-label">{_config.label}</h2>
                            </template>
                            <template lwc:if={_config.helpText}>
                                <p class="pflow-studio__preview-help">{_config.helpText}</p>
                            </template>
                            <c-pflow-molecule-picker-group
                                items={fallbackPreviewItems}
                                variant={_config.layout}
                                selection-mode={_config.selectionMode}
                                show-select-all={_config.showSelectAll}
                                enable-search={_config.enableSearch}
                                grid-min-width={orgGridMinWidth}
                                gap-horizontal={orgGapHorizontal}
                                gap-vertical={orgGapVertical}
                                margin-top={orgMarginTop}
                                margin-right={orgMarginRight}
                                margin-bottom={orgMarginBottom}
                                margin-left={orgMarginLeft}
                                padding-top={orgPaddingTop}
                                padding-right={orgPaddingRight}
                                padding-bottom={orgPaddingBottom}
                                padding-left={orgPaddingLeft}
                                size={orgSize}
                                aspect-ratio={orgAspectRatio}
                                badge-position={orgBadgePosition}
                                badge-variant={orgBadgeVariant}
                                badge-shape={orgBadgeShape}
                                columns={orgColumns}
                                selection-indicator={orgSelectionIndicator}
                                elevation={orgElevation}
                                pattern={orgPattern}
                                pattern-tone={orgPatternTone}
                                corner-style={orgCornerStyle}
                                corner-tone={orgCornerTone}
                                surface-style={orgSurfaceStyle}
                                surface-tone={orgSurfaceTone}
                                icon-decor={orgIconDecor}
                                icon-shape={orgIconShape}
                                icon-style={orgIconStyle}
                                icon-shading={orgIconShading}
                                icon-tone={orgIconTone}
                                icon-tone-hex={orgIconToneHex}
                                pattern-tone-hex={orgPatternToneHex}
                                corner-tone-hex={orgCornerToneHex}
                                surface-tone-hex={orgSurfaceToneHex}
                                badge-variant-hex={orgBadgeVariantHex}
                                icon-glyph-tone={orgIconGlyphTone}
                                icon-glyph-tone-hex={orgIconGlyphToneHex}
                                icon-size={orgIconSize}
                                show-icons={orgShowIcons}
                                show-badges={orgShowBadges}
                                preview-mode="true"
                            ></c-pflow-molecule-picker-group>
                        </template>
                    </div>

                    <template lwc:if={previewCaption}>
                        <p class="pflow-studio__preview-caption slds-text-body_small slds-text-color_weak">
                            {previewCaption}
                        </p>
                    </template>
                </div>
            </aside>

            <!-- SPLITTER -->
            <div
                class="pflow-studio__splitter"
                role="separator"
                aria-orientation="vertical"
                aria-label="Resize left panel"
                aria-valuemin="240"
                aria-valuemax="520"
                aria-valuenow={leftAriaValueNow}
                tabindex="0"
                onpointerdown={handleSplitterPointerDown}
                onpointermove={handleSplitterPointerMove}
                onpointerup={handleSplitterPointerUp}
                onpointercancel={handleSplitterPointerUp}
                onkeydown={handleSplitterKeyDown}
            >
                <span class="pflow-studio__splitter-grip" aria-hidden="true"></span>
            </div>

            <!-- ================================================================
                 RIGHT PANEL · active section's controls
                 ================================================================ -->
            <section class="pflow-studio__controls">
                <template lwc:if={hasActiveSectionIssues}>
                    <ul class="pflow-studio__issues" role="status">
                        <template for:each={activeSectionIssues} for:item="i">
                            <li key={i.message} class={i.level}>
                                <lightning-icon
                                    icon-name="utility:warning"
                                    size="xx-small"
                                    variant="warning"
                                    alternative-text=""
                                ></lightning-icon>
                                <span>{i.message}</span>
                            </li>
                        </template>
                    </ul>
                </template>

                <!-- ═══════════════ CHAPTER 01 · DATA ═══════════════ -->
                <section class="pflow-chapter pflow-chapter_01" data-chapter="data">
                    <aside class="pflow-chapter__mark" aria-hidden="true">
                        <span class="pflow-chapter__numeral">01</span>
                        <span class="pflow-chapter__rule"></span>
                    </aside>
                    <header class="pflow-chapter__head">
                        <p class="pflow-chapter__eyebrow">Chapter · Data</p>
                        <h2 class="pflow-chapter__title">Where the tiles come from</h2>
                    </header>
                </section>
                <template lwc:if={isDataSection}>

                    <!-- CARD 1 · Data source -->
                    <article class="slds-card pflow-studio__card">
                        <header class="slds-card__header pflow-card__head">
                            <span class="pflow-card__glyph pflow-card__glyph_data" aria-hidden="true">
                                <lightning-icon icon-name="utility:database" size="small" alternative-text=""></lightning-icon>
                            </span>
                            <div class="pflow-card__headings">
                                <h3 class="slds-card__header-title slds-text-heading_small">Data source</h3>
                                <p class="slds-card__header-subtitle slds-text-body_small slds-text-color_weak">Pick where the options come from.</p>
                            </div>
                            <lightning-helptext class="pflow-card__help" content="Picklist pulls values from an object's picklist field. Collection binds to a Flow record collection variable. SOQL runs a custom query. Custom lets you type options inline."></lightning-helptext>
                        </header>
                        <div class="slds-card__body slds-card__body_inner">
                            <div class="pflow-studio__pickgroup pflow-studio__pickgroup_2x2" role="radiogroup" aria-label="Data source" oncardselect={handleSourceTileChange}>
                                <template for:each={sourceTiles} for:item="tile">
                                    <c-pflow-atom-visual-pick
                                        key={tile.value}
                                        item={tile}
                                        selected={tile._selected}
                                        selection-mode="single"
                                        group-name="pflow-source"
                                        size="small"
                                        aspect-ratio="1:1"
                                    ></c-pflow-atom-visual-pick>
                                </template>
                            </div>
                        </div>
                    </article>

                    <!-- CARD 2 · Source setup (conditional) -->
                    <template lwc:if={hasDataSource}>
                        <article class="slds-card pflow-studio__card">
                            <header class="slds-card__header pflow-card__head">
                                <span class="pflow-card__glyph pflow-card__glyph_data" aria-hidden="true">
                                    <lightning-icon icon-name={sourceKindIcon} size="small" alternative-text=""></lightning-icon>
                                </span>
                                <div class="pflow-card__headings">
                                    <h3 class="slds-card__header-title slds-text-heading_small">{sourceSetupTitle}</h3>
                                    <p class="slds-card__header-subtitle slds-text-body_small slds-text-color_weak">{sourceSetupSubtitle}</p>
                                </div>
                                <lightning-helptext class="pflow-card__help" content="These fields configure the source you picked above. They change based on the source kind."></lightning-helptext>
                            </header>
                            <div class="slds-card__body slds-card__body_inner pflow-studio__field-block">
                                <template lwc:if={isPicklistMode}>
                                    <c-pflow-molecule-custom-lookup
                                        label="Object"
                                        placeholder="Search objects..."
                                        required
                                        min-search-term-length="0"
                                        selection={picklistObjectSelection}
                                        onsearch={handlePicklistObjectSearch}
                                        onselectionchange={handlePicklistObjectSelect}
                                    ></c-pflow-molecule-custom-lookup>
                                    <c-pflow-molecule-field-picker
                                        label="Picklist field"
                                        required
                                        field-type-filter="PICKLIST,MULTIPICKLIST"
                                        object-api-name={_config.picklist.objectApiName}
                                        value={_config.picklist.fieldApiName}
                                        onfieldchange={handlePicklistFieldChange}
                                    ></c-pflow-molecule-field-picker>
                                    <template lwc:if={hasRecordTypeOptions}>
                                        <lightning-combobox
                                            label="Record Type"
                                            value={recordTypeValue}
                                            options={recordTypeOptions}
                                            placeholder="Default record type"
                                            onchange={handleRecordTypeComboChange}
                                            field-level-help="Pick a record type whose picklist values you want to pull. Leave on Default for the object's primary type."
                                        ></lightning-combobox>
                                    </template>
                                    <template lwc:else>
                                        <c-pflow-organism-resource-picker
                                            name="recordTypeId"
                                            label="Record Type Id (optional)"
                                            value={_config.picklist.recordTypeId}
                                            builder-context={builderContext}
                                            automatic-output-variables={automaticOutputVariables}
                                            builder-context-filter-type="String"
                                            allow-hard-code-reference
                                            onvaluechanged={handleRecordTypeIdChange}
                                        ></c-pflow-organism-resource-picker>
                                    </template>
                                    <lightning-combobox
                                        label="Output value as"
                                        value={picklistValueSource}
                                        options={picklistValueSourceOptions}
                                        onchange={handlePicklistValueSourceChange}
                                    ></lightning-combobox>
                                </template>

                                <template lwc:if={isStringCollectionMode}>
                                    <c-pflow-organism-resource-picker
                                        name="sourceStrings"
                                        label="Flow String[] variable"
                                        required
                                        builder-context-filter-type="String"
                                        builder-context-filter-collection-boolean
                                        value={_sourceStringsRef}
                                        onvaluechanged={handleStringCollectionVariableChange}
                                        builder-context={builderContext}
                                        automatic-output-variables={automaticOutputVariables}
                                    ></c-pflow-organism-resource-picker>
                                    <p class="slds-text-body_small slds-text-color_weak">Each string becomes a tile where the label and value are both the string. Use <strong>Item overrides</strong> below to layer on icons, sublabels, badges, or help text per value.</p>

                                    <!-- Resolved values detected at design time: read-only pill preview.
                                         These power both the live preview AND the per-item overrides
                                         list — the admin doesn't have to type anything. -->
                                    <template lwc:if={hasResolvedStringValues}>
                                        <section class="pflow-string-preview" aria-label="Detected string values">
                                            <header class="pflow-string-preview__head">
                                                <span class="pflow-string-preview__eyebrow">From variable</span>
                                                <span class="pflow-string-preview__count">{resolvedStringCountLabel}</span>
                                            </header>
                                            <div class="pflow-string-preview__list" role="list">
                                                <template for:each={resolvedStringValuePreview} for:item="v">
                                                    <span key={v.key} role="listitem" class="pflow-string-preview__pill">{v.label}</span>
                                                </template>
                                            </div>
                                        </section>
                                    </template>

                                    <!-- Fallback: the bound variable has no design-time default values
                                         (or nothing is bound yet). Let the admin seed the overrides list
                                         manually so per-item config still works. -->
                                    <template lwc:else>
                                        <lightning-textarea
                                            label="Known values (for per-item overrides)"
                                            placeholder="Hot, Warm, Cold"
                                            field-level-help="This variable has no design-time default values. Enter the values you expect at runtime (comma or newline separated) to enable per-item overrides and preview. Runtime still uses the bound Flow variable's actual values."
                                            value={stringCollectionSampleRaw}
                                            onchange={handleStringSamplesChange}
                                        ></lightning-textarea>
                                    </template>
                                </template>

                                <template lwc:if={isCollectionMode}>
                                    <c-pflow-organism-resource-picker
                                        name="sourceRecords"
                                        label="Flow record collection"
                                        required
                                        builder-context-filter-collection-boolean
                                        value={_sourceRecordsRef}
                                        onvaluechanged={handleCollectionVariableChange}
                                        builder-context={builderContext}
                                        automatic-output-variables={automaticOutputVariables}
                                    ></c-pflow-organism-resource-picker>
                                    <section class="pflow-studio__spec-sheet" aria-labelledby="pflow-collection-mapping-title">
                                        <header class="pflow-studio__spec-sheet-head">
                                            <p class="pflow-studio__spec-sheet-eyebrow">Field mapping</p>
                                            <h4 id="pflow-collection-mapping-title" class="pflow-studio__spec-sheet-title">Map collection fields to tile slots</h4>
                                        </header>
                                        <div class="pflow-studio__spec-grid">
                                            <c-pflow-molecule-field-picker label="Label (required)" data-field="label" required value={_config.collection.fieldMap.label} onfieldchange={handleCollectionFieldMapChange}></c-pflow-molecule-field-picker>
                                            <c-pflow-molecule-field-picker label="Value" data-field="value" value={_config.collection.fieldMap.value} onfieldchange={handleCollectionFieldMapChange}></c-pflow-molecule-field-picker>
                                            <c-pflow-molecule-field-picker label="Sublabel" data-field="sublabel" value={_config.collection.fieldMap.sublabel} onfieldchange={handleCollectionFieldMapChange}></c-pflow-molecule-field-picker>
                                            <c-pflow-molecule-field-picker label="Icon" data-field="icon" value={_config.collection.fieldMap.icon} onfieldchange={handleCollectionFieldMapChange}></c-pflow-molecule-field-picker>
                                            <c-pflow-molecule-field-picker label="Badge" data-field="badge" value={_config.collection.fieldMap.badge} onfieldchange={handleCollectionFieldMapChange}></c-pflow-molecule-field-picker>
                                            <c-pflow-molecule-field-picker label="Help text" data-field="helpText" value={_config.collection.fieldMap.helpText} onfieldchange={handleCollectionFieldMapChange}></c-pflow-molecule-field-picker>
                                        </div>
                                    </section>
                                </template>

                                <template lwc:if={isSObjectMode}>
                                    <c-pflow-molecule-custom-lookup
                                        label="SObject"
                                        placeholder="Search objects..."
                                        required
                                        min-search-term-length="0"
                                        selection={sobjectSelection}
                                        onsearch={handleSObjectSearch}
                                        onselectionchange={handleSObjectSelect}
                                    ></c-pflow-molecule-custom-lookup>
                                    <c-pflow-organism-where-builder
                                        object-api-name={_config.sobject.sObjectApiName}
                                        value={_config.sobject.whereClause}
                                        builder-context={builderContext}
                                        automatic-output-variables={automaticOutputVariables}
                                        onchange={handleWhereChange}
                                    ></c-pflow-organism-where-builder>
                                    <c-pflow-molecule-order-limit
                                        object-api-name={_config.sobject.sObjectApiName}
                                        order-by-field={_config.sobject.orderByField}
                                        order-by-direction={_config.sobject.orderByDirection}
                                        query-limit={_config.sobject.limit}
                                        onorderchange={handleOrderChange}
                                        onlimitchange={handleLimitChange}
                                    ></c-pflow-molecule-order-limit>
                                    <section class="pflow-studio__spec-sheet" aria-labelledby="pflow-sobject-mapping-title">
                                        <header class="pflow-studio__spec-sheet-head">
                                            <p class="pflow-studio__spec-sheet-eyebrow">Field mapping</p>
                                            <h4 id="pflow-sobject-mapping-title" class="pflow-studio__spec-sheet-title">Map query columns to tile slots</h4>
                                        </header>
                                        <div class="pflow-studio__spec-grid">
                                            <c-pflow-molecule-field-picker label="Label (required)" data-field="labelField" required object-api-name={_config.sobject.sObjectApiName} value={_config.sobject.labelField} onfieldchange={handleSObjectFieldChange}></c-pflow-molecule-field-picker>
                                            <c-pflow-molecule-field-picker label="Value" data-field="valueField" object-api-name={_config.sobject.sObjectApiName} value={_config.sobject.valueField} onfieldchange={handleSObjectFieldChange}></c-pflow-molecule-field-picker>
                                            <c-pflow-molecule-field-picker label="Sublabel" data-field="sublabelField" object-api-name={_config.sobject.sObjectApiName} value={_config.sobject.sublabelField} onfieldchange={handleSObjectFieldChange}></c-pflow-molecule-field-picker>
                                            <c-pflow-molecule-field-picker label="Icon" data-field="iconField" object-api-name={_config.sobject.sObjectApiName} value={_config.sobject.iconField} onfieldchange={handleSObjectFieldChange}></c-pflow-molecule-field-picker>
                                            <c-pflow-molecule-field-picker label="Badge" data-field="badgeField" object-api-name={_config.sobject.sObjectApiName} value={_config.sobject.badgeField} onfieldchange={handleSObjectFieldChange}></c-pflow-molecule-field-picker>
                                            <c-pflow-molecule-field-picker label="Help text" data-field="helpField" object-api-name={_config.sobject.sObjectApiName} value={_config.sobject.helpField} onfieldchange={handleSObjectFieldChange}></c-pflow-molecule-field-picker>
                                        </div>
                                    </section>
                                </template>

                                <template lwc:if={isCustomMode}>
                                    <p class="slds-text-body_small slds-text-color_weak">You'll add options in the <strong>Items</strong> card below.</p>
                                </template>
                            </div>
                        </article>
                    </template>

                    <!-- CARD 3 · Items (conditional, per source) -->
                    <template lwc:if={isCustomMode}>
                        <article class="slds-card pflow-studio__card">
                            <header class="slds-card__header pflow-card__head">
                                <span class="pflow-card__glyph pflow-card__glyph_data" aria-hidden="true">
                                    <lightning-icon icon-name="utility:list" size="small" alternative-text=""></lightning-icon>
                                </span>
                                <div class="pflow-card__headings">
                                    <h3 class="slds-card__header-title slds-text-heading_small">Items</h3>
                                    <p class="slds-card__header-subtitle slds-text-body_small slds-text-color_weak">Add, reorder, or remove the options users will see.</p>
                                </div>
                                <lightning-helptext class="pflow-card__help" content="These are the literal options that appear as tiles. Label is what users read; value is what Flow receives when they pick."></lightning-helptext>
                            </header>
                            <div class="slds-card__body slds-card__body_inner pflow-studio__field-block">
                                <template for:each={customItems} for:item="row">
                                    <article key={row.index} class="pflow-studio__custom-row">
                                        <header class="pflow-studio__custom-row-head">
                                            <h4>Option · {row.index}</h4>
                                            <div class="slds-button-group" role="group" aria-label="Reorder option">
                                                <lightning-button-icon icon-name="utility:up" size="x-small" alternative-text="Move up" data-index={row.index} disabled={row.canMoveUp} onclick={handleCustomMoveUp}></lightning-button-icon>
                                                <lightning-button-icon icon-name="utility:down" size="x-small" alternative-text="Move down" data-index={row.index} disabled={row.canMoveDown} onclick={handleCustomMoveDown}></lightning-button-icon>
                                                <lightning-button-icon icon-name="utility:copy" size="x-small" alternative-text="Duplicate" data-index={row.index} onclick={handleCustomDuplicateRow}></lightning-button-icon>
                                                <lightning-button-icon icon-name="utility:delete" size="x-small" variant="bare" alternative-text="Delete" data-index={row.index} onclick={handleCustomRemoveRow}></lightning-button-icon>
                                            </div>
                                        </header>
                                        <div class="pflow-studio__custom-grid">
                                            <c-pflow-molecule-icon-picker label="Icon" mode="combobox" value={row.icon} data-index={row.index} oniconselect={handleCustomIconChange}></c-pflow-molecule-icon-picker>

                    <!-- CARD · Selection mode -->
                    <article class="slds-card pflow-studio__card">
                        <header class="slds-card__header pflow-card__head">
                            <span class="pflow-card__glyph pflow-card__glyph_behavior" aria-hidden="true">
                                <lightning-icon icon-name="utility:check" size="small" alternative-text=""></lightning-icon>
                            </span>
                            <div class="pflow-card__headings">
                                <h3 class="slds-card__header-title slds-text-heading_small">Selection mode</h3>
                                <p class="slds-card__header-subtitle slds-text-body_small slds-text-color_weak">Does the user pick one, or several?</p>
                            </div>
                            <lightning-helptext class="pflow-card__help" content="Single = exactly one option. Multi = any number within min/max. Auto-advance only works in single mode."></lightning-helptext>
                        </header>
                        <div class="slds-card__body slds-card__body_inner">
                            <div class="pflow-studio__pickgroup" role="radiogroup" aria-label="Selection mode" oncardselect={handleSelectionTileChange}>
                                <template for:each={selectionTiles} for:item="tile">
                                    <c-pflow-atom-visual-pick
                                        key={tile.value}
                                        item={tile}
                                        selected={tile._selected}
                                        selection-mode="single"
                                        group-name="pflow-selection"
                                        size="small"
                                        aspect-ratio="1:1"
                                    ></c-pflow-atom-visual-pick>
                                </template>
                            </div>
                        </div>
                    </article>

                    <!-- CARD · Selection rules -->
                    <article class="slds-card pflow-studio__card">
                        <header class="slds-card__header pflow-card__head">
                            <span class="pflow-card__glyph pflow-card__glyph_behavior" aria-hidden="true">
                                <lightning-icon icon-name="utility:rules" size="small" alternative-text=""></lightning-icon>
                            </span>
                            <div class="pflow-card__headings">
                                <h3 class="slds-card__header-title slds-text-heading_small">Selection rules</h3>
                                <p class="slds-card__header-subtitle slds-text-body_small slds-text-color_weak">Required, min / max, and auto-advance.</p>
                            </div>
                            <lightning-helptext class="pflow-card__help" content="Min/Max apply only in multi mode. A custom error message replaces the default 'Please make a selection.' when validation fails."></lightning-helptext>
                        </header>
                        <div class="slds-card__body slds-card__body_inner pflow-studio__field-block">
                            <template lwc:if={isMultiSelect}>
                                <div class="pflow-studio__field-grid">
                                    <lightning-input
                                        type="number"
                                        label="Minimum selections"
                                        value={_config.minSelections}
                                        min="0"
                                        onchange={handleMinChange}
                                    ></lightning-input>
                                    <lightning-input
                                        type="number"
                                        label="Maximum selections"
                                        placeholder="Unlimited"
                                        value={_config.maxSelections}
                                        min="1"
                                        onchange={handleMaxChange}
                                    ></lightning-input>
                                </div>
                            </template>
                            <lightning-input
                                type="toggle"
                                label="Required"
                                checked={_config.required}
                                data-key="required"
                                onchange={handleToggleChange}
                            ></lightning-input>
                            <template lwc:if={_config.required}>
                                <c-pflow-organism-resource-picker
                                    name="customErrorMessage"
                                    label="Custom error message (optional)"
                                    value={_config.customErrorMessage}
                                    builder-context={builderContext}
                                    automatic-output-variables={automaticOutputVariables}
                                    builder-context-filter-type="String"
                                    allow-hard-code-reference
                                    onvaluechanged={handleErrorMessageChange}
                                ></c-pflow-organism-resource-picker>
                            </template>
                            <template lwc:if={isSingleSelect}>
                                <lightning-input
                                    type="toggle"
                                    label="Auto-advance the flow on selection"
                                    checked={_config.autoAdvance}
                                    data-key="autoAdvance"
                                    field-level-help="Fires Flow Next the moment a user picks a tile."
                                    onchange={handleToggleChange}
                                ></lightning-input>
                            </template>
                        </div>
                    </article>

                    <!-- CARD · None option -->
                    <template lwc:if={isNoneOptionAvailable}>
                        <article class="slds-card pflow-studio__card">
                            <header class="slds-card__header pflow-card__head">
                                <span class="pflow-card__glyph pflow-card__glyph_behavior" aria-hidden="true">
                                    <lightning-icon icon-name="utility:clear" size="small" alternative-text=""></lightning-icon>
                                </span>
                                <div class="pflow-card__headings">
                                    <h3 class="slds-card__header-title slds-text-heading_small">None option</h3>
                                    <p class="slds-card__header-subtitle slds-text-body_small slds-text-color_weak">Let users clear their selection with a dedicated tile.</p>
                                </div>
                                <lightning-helptext class="pflow-card__help" content="Prepends a '--None--' choice (empty value) so users can unset the picker. Single-select only."></lightning-helptext>
                            </header>
                            <div class="slds-card__body slds-card__body_inner pflow-studio__field-block">
                                <lightning-input
                                    type="toggle"
                                    label="Include a --None-- option"
                                    checked={noneOptionValue}
                                    data-key="includeNoneOption"
                                    field-level-help="Adds a blank-value tile to the list so users can clear their pick."
                                    onchange={handleToggleChange}
                                ></lightning-input>
                                <lightning-input
                                    type="text"
                                    label="None option label"
                                    value={noneOptionLabelValue}
                                    placeholder="--None--"
                                    disabled={isNoneOptionLabelDisabled}
                                    onchange={handleNoneOptionLabelChange}
                                ></lightning-input>
                                <div class="pflow-studio__field" aria-label="None option position">
                                    <p class="pflow-studio__field-label">Position</p>
                                    <div class="pflow-studio__pickgroup" role="radiogroup" aria-label="None option position" oncardselect={handleNoneOptionPositionChange}>
                                        <template for:each={noneOptionPositionTiles} for:item="tile">
                                            <c-pflow-atom-visual-pick
                                                key={tile.value}
                                                item={tile}
                                                selected={tile._selected}
                                                disabled={tile._disabled}
                                                selection-mode="single"
                                                group-name="pflow-none-pos"
                                                size="small"
                                            ></c-pflow-atom-visual-pick>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </article>
                    </template>

                    <!-- CARD · Search & toolbar -->
                    <article class="slds-card pflow-studio__card">
                        <header class="slds-card__header pflow-card__head">
                            <span class="pflow-card__glyph pflow-card__glyph_behavior" aria-hidden="true">
                                <lightning-icon icon-name="utility:search" size="small" alternative-text=""></lightning-icon>
                            </span>
                            <div class="pflow-card__headings">
                                <h3 class="slds-card__header-title slds-text-heading_small">Search &amp; toolbar</h3>
                                <p class="slds-card__header-subtitle slds-text-body_small slds-text-color_weak">Extra controls users can use to filter and bulk-select.</p>
                            </div>
                            <lightning-helptext class="pflow-card__help" content="Search adds a filter input above the tiles. The Select-all / Clear-all toolbar appears only in multi mode."></lightning-helptext>
                        </header>
                        <div class="slds-card__body slds-card__body_inner pflow-studio__field-block">
                            <lightning-input
                                type="toggle"
                                label="Show a search filter"
                                checked={_config.enableSearch}
                                data-key="enableSearch"
                                onchange={handleToggleChange}
                            ></lightning-input>
                            <template lwc:if={isMultiSelect}>
                                <lightning-input
                                    type="toggle"
                                    label="Show Select all / Clear all toolbar"
                                    checked={_config.showSelectAll}
                                    data-key="showSelectAll"
                                    onchange={handleToggleChange}
                                ></lightning-input>
                            </template>
                        </div>
                    </article>
                </template>

                <!-- ═══════════════ CHAPTER 04 · APPEARANCE ═══════════════ -->
                <section class="pflow-chapter pflow-chapter_04" data-chapter="appearance">
                    <aside class="pflow-chapter__mark" aria-hidden="true">
                        <span class="pflow-chapter__numeral">04</span>
                        <span class="pflow-chapter__rule"></span>
                    </aside>
                    <header class="pflow-chapter__head">
                        <p class="pflow-chapter__eyebrow">Chapter · Appearance</p>
                        <h2 class="pflow-chapter__title">How it looks</h2>
                    </header>
                </section>
                <template lwc:if={isLayoutSection}>

                    <!-- ▂▂▂▂ FOUNDATION — layout + tile geometry ▂▂▂▂ -->
                    <div class="pflow-studio__subchapter" role="separator" aria-label="Foundation">
                        <span class="pflow-studio__subchapter-eyebrow">
                            <span class="pflow-studio__subchapter-numeral">04·A</span>
                            <span class="pflow-studio__subchapter-title">Foundation</span>
                        </span>
                        <span class="pflow-studio__subchapter-rule" aria-hidden="true"></span>
                        <span></span>
                    </div>

                    <article class="slds-card pflow-studio__card">
                        <header class="slds-card__header pflow-card__head">
                            <span class="pflow-card__glyph pflow-card__glyph_appearance" aria-hidden="true">
                                <lightning-icon icon-name="utility:apps" size="small" alternative-text=""></lightning-icon>
                            </span>
                            <div class="pflow-card__headings">
                                <h3 class="slds-card__header-title slds-text-heading_small">Layout style</h3>
                                <p class="slds-card__header-subtitle slds-text-body_small slds-text-color_weak">Arrange tiles as a grid or a stacked list.</p>
                            </div>
                            <lightning-helptext class="pflow-card__help" content="Grid wraps tiles across columns. List stacks them vertically as full-width rows."></lightning-helptext>
                        </header>
                        <div class="slds-card__body slds-card__body_inner">
                            <div class="pflow-studio__pickgroup" role="radiogroup" aria-label="Layout" oncardselect={handleLayoutTileChange}>
                                <template for:each={layoutTiles} for:item="tile">
                                    <c-pflow-atom-visual-pick
                                        key={tile.value}
                                        item={tile}
                                        selected={tile._selected}
                                        disabled={tile._disabled}
                                        selection-mode="single"
                                        group-name="pflow-layout"
                                        size="small"
                                        aspect-ratio="1:1"
                                    ></c-pflow-atom-visual-pick>
                                </template>
                            </div>
                        </div>
                    </article>

                    <template lwc:if={showTileSize}>
                        <article class="slds-card pflow-studio__card">
                            <header class="slds-card__header pflow-card__head">
                                <span class="pflow-card__glyph pflow-card__glyph_appearance" aria-hidden="true">
                                    <lightning-icon icon-name="utility:expand" size="small" alternative-text=""></lightning-icon>
                                </span>
                                <div class="pflow-card__headings">
                                    <h3 class="slds-card__header-title slds-text-heading_small">Tile size</h3>
                                    <p class="slds-card__header-subtitle slds-text-body_small slds-text-color_weak">How wide each tile is and how dense the typography feels.</p>
                                </div>
                                <lightning-helptext class="pflow-card__help" content="Size fixes the tile width: Small = 7.5rem, Medium = 12rem, Large = 16rem. The grid column width follows the size so layouts stay predictable."></lightning-helptext>
                            </header>
                            <div class="slds-card__body slds-card__body_inner">
                                <div class="pflow-studio__pickgroup" role="radiogroup" aria-label="Tile size" oncardselect={handleSizeTileChange}>
                                    <template for:each={sizeTiles} for:item="tile">
                                        <c-pflow-atom-visual-pick
                                            key={tile.value}
                                            item={tile}
                                            selected={tile._selected}
                                            selection-mode="single"
                                            group-name="pflow-size"
                                            size="small"
                                            aspect-ratio="1:1"
                                        ></c-pflow-atom-visual-pick>
                                    </template>
                                </div>
                            </div>
                        </article>
                    </template>

                    <template lwc:if={showAspectRatio}>
                        <article class="slds-card pflow-studio__card">
                            <header class="slds-card__header pflow-card__head">
                                <span class="pflow-card__glyph pflow-card__glyph_appearance" aria-hidden="true">
                                    <lightning-icon icon-name="utility:crop" size="small" alternative-text=""></lightning-icon>
                                </span>
                                <div class="pflow-card__headings">
                                    <h3 class="slds-card__header-title slds-text-heading_small">Aspect ratio</h3>
                                    <p class="slds-card__header-subtitle slds-text-body_small slds-text-color_weak">The shape of each tile — square, landscape, wide, or portrait.</p>
                                </div>
                                <lightning-helptext class="pflow-card__help" content="Tile height is calculated from this ratio applied to its width. 1:1 is square; 16:9 is cinematic; 3:4 is portrait."></lightning-helptext>
                            </header>
                            <div class="slds-card__body slds-card__body_inner">
                                <div class="pflow-studio__pickgroup pflow-studio__pickgroup_2x2" role="radiogroup" aria-label="Aspect ratio" oncardselect={handleAspectChange}>
                                    <template for:each={aspectTiles} for:item="tile">
                                        <c-pflow-atom-visual-pick
                                            key={tile.value}
                                            item={tile}
                                            selected={tile._selected}
                                            selection-mode="single"
                                            group-name="pflow-aspect"
                                            size="small"
                                            aspect-ratio="1:1"
                                        ></c-pflow-atom-visual-pick>
                                    </template>
                                </div>
                            </div>
                        </article>
                    </template>

                    <!-- ═════════════════════ COLUMNS ═════════════════════ -->
                    <template lwc:if={showColumns}>
                    <article class="slds-card pflow-studio__card">
                        <header class="slds-card__header pflow-card__head">
                            <span class="pflow-card__glyph pflow-card__glyph_appearance" aria-hidden="true">
                                <lightning-icon icon-name="utility:table" size="small" alternative-text=""></lightning-icon>
                            </span>
                            <div class="pflow-card__headings">
                                <h3 class="slds-card__header-title slds-text-heading_small">Column count</h3>
                                <p class="slds-card__header-subtitle slds-text-body_small slds-text-color_weak">Force a fixed grid width. Auto lets tiles reflow with the container.</p>
                            </div>
                            <lightning-helptext class="pflow-card__help" content="Grid mode only. Auto uses the tile size's canonical column width and wraps responsively. Fixed (1–6) forces that many equal columns regardless of container width."></lightning-helptext>
                        </header>
                        <div class="slds-card__body slds-card__body_inner">
                            <div class="pflow-studio__col-row" role="radiogroup" aria-label="Columns">
                                <template for:each={columnChips} for:item="chip">
                                    <button
                                        key={chip.value}
                                        type="button"
                                        class={chip.className}
                                        data-value={chip.value}
                                        aria-pressed={chip.ariaPressed}
                                        onclick={handleColumnsChange}
                                    >{chip.label}</button>
                                </template>
                            </div>
                        </div>
                    </article>
                    </template>

                    <!-- ▂▂▂▂ CARD — tile surface design ▂▂▂▂ -->
                    <template lwc:if={isTileLayout}>
                        <div class="pflow-studio__subchapter" role="separator" aria-label="Card design">
                            <span class="pflow-studio__subchapter-eyebrow">
                                <span class="pflow-studio__subchapter-numeral">04·B</span>
                                <span class="pflow-studio__subchapter-title">Card</span>
                            </span>
                            <span class="pflow-studio__subchapter-rule" aria-hidden="true"></span>
                            <span></span>
                        </div>
                    </template>

                    <!-- ═════════════════════ ELEVATION ═════════════════════ -->
                    <template lwc:if={showElevation}>
                    <article class="slds-card pflow-studio__card">
                        <header class="slds-card__header pflow-card__head">
                            <span class="pflow-card__glyph pflow-card__glyph_appearance" aria-hidden="true">
                                <lightning-icon icon-name="utility:frozen" size="small" alternative-text=""></lightning-icon>
                            </span>
                            <div class="pflow-card__headings">
                                <h3 class="slds-card__header-title slds-text-heading_small">Card elevation</h3>
                                <p class="slds-card__header-subtitle slds-text-body_small slds-text-color_weak">Flat, outlined, or elevated card style.</p>
                            </div>
                            <lightning-helptext class="pflow-card__help" content="Outlined has a 1px border (default). Flat removes the border and uses a tinted surface. Elevated adds a permanent drop shadow so tiles read as physical cards."></lightning-helptext>
                        </header>
                        <div class="slds-card__body slds-card__body_inner">
                            <div class="pflow-studio__pickgroup" role="radiogroup" aria-label="Card elevation" oncardselect={handleElevationChange}>
                                <template for:each={elevationTiles} for:item="tile">
                                    <c-pflow-atom-visual-pick
                                        key={tile.value}
                                        item={tile}
                                        selected={tile._selected}
                                        selection-mode="single"
                                        group-name="pflow-elevation"
                                        size="small"
                                        aspect-ratio="1:1"
                                    ></c-pflow-atom-visual-pick>
                                </template>
                            </div>
                        </div>
                    </article>
                    </template>

                    <!-- ═══════════════ PATTERN — dots/lines/diagonal/etc. ═══════════════ -->
                    <template lwc:if={isTileLayout}>
                    <article class="slds-card pflow-studio__card">
                        <header class="slds-card__header pflow-card__head">
                            <span class="pflow-card__glyph pflow-card__glyph_appearance" aria-hidden="true">
                                <lightning-icon icon-name="utility:dot_net" size="small" alternative-text=""></lightning-icon>
                            </span>
                            <div class="pflow-card__headings">
                                <h3 class="slds-card__header-title slds-text-heading_small">Pattern overlay</h3>
                                <p class="slds-card__header-subtitle slds-text-body_small slds-text-color_weak">Decorative texture layered on each tile. Choose a pattern, then its color tone.</p>
                            </div>
                            <lightning-helptext class="pflow-card__help" content="Patterns layer over the surface. They work with every surface style — e.g. brand radial surface + neutral dots pattern."></lightning-helptext>
                        </header>
                        <div class="slds-card__body slds-card__body_inner pflow-studio__field-block">
                            <div class="pflow-studio__pickgroup" role="radiogroup" aria-label="Pattern" oncardselect={handlePatternChange}>
                                <template for:each={patternTiles} for:item="tile">
                                    <c-pflow-atom-visual-pick
                                        key={tile.value}
                                        item={tile}
                                        selected={tile._selected}
                                        selection-mode="single"
                                        group-name="pflow-pattern"
                                        size="small"
                                        aspect-ratio="1:1"
                                    ></c-pflow-atom-visual-pick>
                                </template>
                            </div>
                            <div class="pflow-tone-row" role="radiogroup" aria-label="Pattern color">
                                <span class="pflow-tone-row__eyebrow">Color</span>
                                <template for:each={patternToneChips} for:item="chip">
                                    <button
                                        key={chip.value}
                                        type="button"
                                        class={chip.className}
                                        data-value={chip.value}
                                        aria-pressed={chip.ariaPressed}
                                        title={chip.label}
                                        disabled={chip.disabled}
                                        onclick={handlePatternToneChange}
                                    >
                                        <span class={chip.dotClassName} aria-hidden="true"></span>
                                        <span class="pflow-tone-chip__label">{chip.label}</span>
                                    </button>
                                </template>
                            </div>
                            <template lwc:if={patternToneIsCustom}>
                                <div class="pflow-hex-row">
                                    <label class="pflow-hex-row__label" for="pattern-tone-hex">Custom color</label>
                                    <input
                                        id="pattern-tone-hex"
                                        type="color"
                                        class="pflow-hex-row__picker"
                                        value={patternToneHexValue}
                                        oninput={handlePatternToneHexChange}
                                        onchange={handlePatternToneHexChange}
                                        aria-label="Pick pattern color"
                                    />
                                    <input
                                        type="text"
                                        class="pflow-hex-row__input"
                                        value={patternToneHexValue}
                                        placeholder="#3baa6f"
                                        onchange={handlePatternToneHexChange}
                                        aria-label="Hex color value"
                                    />
                                </div>
                            </template>
                        </div>
                    </article>

                    <!-- ═══════════════ CORNERS — trim/brackets/dots ═══════════════ -->
                    <article class="slds-card pflow-studio__card">
                        <header class="slds-card__header pflow-card__head">
                            <span class="pflow-card__glyph pflow-card__glyph_appearance" aria-hidden="true">
                                <lightning-icon icon-name="utility:crop" size="small" alternative-text=""></lightning-icon>
                            </span>
                            <div class="pflow-card__headings">
                                <h3 class="slds-card__header-title slds-text-heading_small">Corner flourish</h3>
                                <p class="slds-card__header-subtitle slds-text-body_small slds-text-color_weak">Printer-style trim marks, heavier brackets, or corner dots.</p>
                            </div>
                            <lightning-helptext class="pflow-card__help" content="Corner decorations sit inside each tile edge. Pick the style, then a color tone."></lightning-helptext>
                        </header>
                        <div class="slds-card__body slds-card__body_inner pflow-studio__field-block">
                            <div class="pflow-studio__pickgroup" role="radiogroup" aria-label="Corner style" oncardselect={handleCornerChange}>
                                <template for:each={cornerTiles} for:item="tile">
                                    <c-pflow-atom-visual-pick
                                        key={tile.value}
                                        item={tile}
                                        selected={tile._selected}
                                        selection-mode="single"
                                        group-name="pflow-corner"
                                        size="small"
                                        aspect-ratio="1:1"
                                    ></c-pflow-atom-visual-pick>
                                </template>
                            </div>
                            <div class="pflow-tone-row" role="radiogroup" aria-label="Corner color">
                                <span class="pflow-tone-row__eyebrow">Color</span>
                                <template for:each={cornerToneChips} for:item="chip">
                                    <button
                                        key={chip.value}
                                        type="button"
                                        class={chip.className}
                                        data-value={chip.value}
                                        aria-pressed={chip.ariaPressed}
                                        title={chip.label}
                                        disabled={chip.disabled}
                                        onclick={handleCornerToneChange}
                                    >
                                        <span class={chip.dotClassName} aria-hidden="true"></span>
                                        <span class="pflow-tone-chip__label">{chip.label}</span>
                                    </button>
                                </template>
                            </div>
                            <template lwc:if={cornerToneIsCustom}>
                                <div class="pflow-hex-row">
                                    <label class="pflow-hex-row__label" for="corner-tone-hex">Custom color</label>
                                    <input
                                        id="corner-tone-hex"
                                        type="color"
                                        class="pflow-hex-row__picker"
                                        value={cornerToneHexValue}
                                        oninput={handleCornerToneHexChange}
                                        onchange={handleCornerToneHexChange}
                                        aria-label="Pick corner color"
                                    />
                                    <input
                                        type="text"
                                        class="pflow-hex-row__input"
                                        value={cornerToneHexValue}
                                        placeholder="#3baa6f"
                                        onchange={handleCornerToneHexChange}
                                        aria-label="Hex color value"
                                    />
                                </div>
                            </template>
                        </div>
                    </article>

                    <!-- ═══════════════ SURFACE — gradient styles ═══════════════ -->
                    <article class="slds-card pflow-studio__card">
                        <header class="slds-card__header pflow-card__head">
                            <span class="pflow-card__glyph pflow-card__glyph_appearance" aria-hidden="true">
                                <lightning-icon icon-name="utility:picklist" size="small" alternative-text=""></lightning-icon>
                            </span>
                            <div class="pflow-card__headings">
                                <h3 class="slds-card__header-title slds-text-heading_small">Surface style</h3>
