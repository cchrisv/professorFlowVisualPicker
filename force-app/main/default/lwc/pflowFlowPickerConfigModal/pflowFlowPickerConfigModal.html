                                <div class="pflow-studio__slider-scale">
                                    <span>{gridMinWidthScaleMin}</span>
                                    <span>{gridMinWidthScaleMax}</span>
                                </div>
                            </div>
                        </div>
                    </article>
                    </template>

                    <template lwc:if={showGapCard}>
                    <article class="slds-card pflow-studio__card">
                        <header class="slds-card__header pflow-card__head">
                            <span class="pflow-card__glyph pflow-card__glyph_appearance" aria-hidden="true">
                                <lightning-icon icon-name="utility:rows" size="small" alternative-text=""></lightning-icon>
                            </span>
                            <div class="pflow-card__headings">
                                <h3 class="slds-card__header-title slds-text-heading_small">Tile gaps</h3>
                                <p class="slds-card__header-subtitle slds-text-body_small slds-text-color_weak">Space between tiles.</p>
                            </div>
                            <lightning-helptext class="pflow-card__help" content="Each chip maps to an SLDS 2 spacing token. Horizontal controls column gap (side-by-side tiles); vertical controls row gap (stacked rows)."></lightning-helptext>
                        </header>
                        <div class="slds-card__body slds-card__body_inner pflow-studio__field-block">
                            <template lwc:if={showGapHorizontal}>
                                <div class="pflow-studio__axis">
                                    <div class="pflow-studio__axis-head">
                                        <lightning-icon icon-name="utility:resize_horizontal" size="x-small" alternative-text=""></lightning-icon>
                                        <div class="pflow-studio__axis-text">
                                            <h4 class="pflow-studio__axis-title">Horizontal</h4>
                                            <p class="pflow-studio__axis-sub">Column gap between tiles.</p>
                                        </div>
                                    </div>
                                    <div class="pflow-studio__pickgroup pflow-studio__pickgroup_compact" role="radiogroup" aria-label="Horizontal gap" oncardselect={handleGapHorizontalToken}>
                                        <template for:each={gapHTiles} for:item="tile">
                                            <c-pflow-atom-visual-pick
                                                key={tile.id}
                                                item={tile}
                                                selected={tile._selected}
                                                selection-mode="single"
                                                group-name="pflow-gap-h"
                                                size="small"
                                                aspect-ratio="3:4"
                                                icon-size="small"
                                            ></c-pflow-atom-visual-pick>
                                        </template>
                                    </div>
                                </div>
                            </template>
                            <template lwc:if={showGapVertical}>
                                <div class="pflow-studio__axis">
                                    <div class="pflow-studio__axis-head">
                                        <lightning-icon icon-name="utility:resize_vertical" size="x-small" alternative-text=""></lightning-icon>
                                        <div class="pflow-studio__axis-text">
                                            <h4 class="pflow-studio__axis-title">Vertical</h4>
                                            <p class="pflow-studio__axis-sub">Row gap between tiles.</p>
                                        </div>
                                    </div>
                                    <div class="pflow-studio__pickgroup pflow-studio__pickgroup_compact" role="radiogroup" aria-label="Vertical gap" oncardselect={handleGapVerticalToken}>
                                        <template for:each={gapVTiles} for:item="tile">
                                            <c-pflow-atom-visual-pick
                                                key={tile.id}
                                                item={tile}
                                                selected={tile._selected}
                                                selection-mode="single"
                                                group-name="pflow-gap-v"
                                                size="small"
                                                aspect-ratio="3:4"
                                                icon-size="small"
                                            ></c-pflow-atom-visual-pick>
                                        </template>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </article>
                    </template>

                    <template lwc:if={showMarginPadding}>
                    <article class="slds-card pflow-studio__card">
                        <header class="slds-card__header pflow-card__head">
                            <span class="pflow-card__glyph pflow-card__glyph_appearance" aria-hidden="true">
                                <lightning-icon icon-name="utility:expand_alt" size="small" alternative-text=""></lightning-icon>
                            </span>
                            <div class="pflow-card__headings">
                                <h3 class="slds-card__header-title slds-text-heading_small">Outer margin</h3>
                                <p class="slds-card__header-subtitle slds-text-body_small slds-text-color_weak">Space around the whole picker at runtime.</p>
                            </div>
                            <lightning-helptext class="pflow-card__help" content="Link all sides to set one value, or unlink for per-side control. Each side maps to an SLDS 2 spacing token."></lightning-helptext>
                        </header>
                        <div class="slds-card__body slds-card__body_inner pflow-studio__field-block">
                            <lightning-input
                                type="toggle"
                                label="Link all sides"
                                message-toggle-active="All four sides share one value"
                                message-toggle-inactive="Set each side independently"
                                checked={marginLinked}
                                onchange={handleMarginLinkToggle}
                            ></lightning-input>
                            <template lwc:if={marginLinked}>
                                <div class="pflow-studio__pickgroup pflow-studio__pickgroup_compact" role="radiogroup" aria-label="Margin — all sides" oncardselect={handleMarginAllChange}>
                                    <template for:each={marginAllTiles} for:item="tile">
                                        <c-pflow-atom-visual-pick
                                            key={tile.id}
                                            item={tile}
                                            selected={tile._selected}
                                            selection-mode="single"
                                            group-name="pflow-margin-all"
                                            size="small"
                                            aspect-ratio="3:4"
                                            icon-size="small"
                                        ></c-pflow-atom-visual-pick>
                                    </template>
                                </div>
                            </template>
                            <template lwc:else>
                                <template for:each={marginSideSections} for:item="section">
                                    <div key={section.side} class="pflow-studio__axis" data-section-side={section.side}>
                                        <div class="pflow-studio__axis-head">
                                            <lightning-icon icon-name={section.icon} size="x-small" alternative-text=""></lightning-icon>
                                            <div class="pflow-studio__axis-text">
                                                <h4 class="pflow-studio__axis-title">{section.label}</h4>
                                            </div>
                                        </div>
                                        <div class="pflow-studio__pickgroup pflow-studio__pickgroup_compact" role="radiogroup" aria-label={section.label} data-side={section.side} oncardselect={handleMarginSideChange}>
                                            <template for:each={section.tiles} for:item="tile">
                                                <c-pflow-atom-visual-pick
                                                    key={tile.id}
                                                    item={tile}
                                                    selected={tile._selected}
                                                    selection-mode="single"
                                                    group-name="pflow-margin-side"
                                                    size="small"
                                                    aspect-ratio="1:1"
                                                    icon-size="small"
                                                ></c-pflow-atom-visual-pick>
                                            </template>
                                        </div>
                                    </div>
                                </template>
                            </template>
                        </div>
                    </article>

                    <article class="slds-card pflow-studio__card">
                        <header class="slds-card__header pflow-card__head">
                            <span class="pflow-card__glyph pflow-card__glyph_appearance" aria-hidden="true">
                                <lightning-icon icon-name="utility:contract_alt" size="small" alternative-text=""></lightning-icon>
                            </span>
                            <div class="pflow-card__headings">
                                <h3 class="slds-card__header-title slds-text-heading_small">Inner tile padding</h3>
                                <p class="slds-card__header-subtitle slds-text-body_small slds-text-color_weak">Space inside each tile between its border and content.</p>
                            </div>
                            <lightning-helptext class="pflow-card__help" content="Padding drives the content gap too — the space between icon and text is always half the padding. Pick Auto to follow the tile size's default."></lightning-helptext>
                        </header>
                        <div class="slds-card__body slds-card__body_inner pflow-studio__field-block">
                            <lightning-input
                                type="toggle"
                                label="Link all sides"
                                message-toggle-active="All four sides share one value"
                                message-toggle-inactive="Set each side independently"
                                checked={paddingLinked}
                                onchange={handlePaddingLinkToggle}
                            ></lightning-input>
                            <template lwc:if={paddingLinked}>
                                <div class="pflow-studio__pickgroup pflow-studio__pickgroup_compact" role="radiogroup" aria-label="Padding — all sides" oncardselect={handlePaddingAllChange}>
                                    <template for:each={paddingAllTiles} for:item="tile">
                                        <c-pflow-atom-visual-pick
                                            key={tile.id}
                                            item={tile}
                                            selected={tile._selected}
                                            selection-mode="single"
                                            group-name="pflow-padding-all"
                                            size="small"
                                            aspect-ratio="3:4"
                                            icon-size="small"
                                        ></c-pflow-atom-visual-pick>
                                    </template>
                                </div>
                            </template>
                            <template lwc:else>
                                <template for:each={paddingSideSections} for:item="section">
                                    <div key={section.side} class="pflow-studio__axis" data-section-side={section.side}>
                                        <div class="pflow-studio__axis-head">
                                            <lightning-icon icon-name={section.icon} size="x-small" alternative-text=""></lightning-icon>
                                            <div class="pflow-studio__axis-text">
                                                <h4 class="pflow-studio__axis-title">{section.label}</h4>
                                            </div>
                                        </div>
                                        <div class="pflow-studio__pickgroup pflow-studio__pickgroup_compact" role="radiogroup" aria-label={section.label} data-side={section.side} oncardselect={handlePaddingSideChange}>
                                            <template for:each={section.tiles} for:item="tile">
                                                <c-pflow-atom-visual-pick
                                                    key={tile.id}
                                                    item={tile}
                                                    selected={tile._selected}
                                                    selection-mode="single"
                                                    group-name="pflow-padding-side"
                                                    size="small"
                                                    aspect-ratio="1:1"
                                                    icon-size="small"
                                                ></c-pflow-atom-visual-pick>
                                            </template>
                                        </div>
                                    </div>
                                </template>
                            </template>
                        </div>
                    </article>
                    </template>
                </template>
            </section>
        </div>
    </lightning-modal-body>

    <lightning-modal-footer>
        <lightning-button label="Cancel" onclick={handleCancel}></lightning-button>
        <lightning-button
            variant="brand"
            label="Save"
            disabled={saveDisabled}
            title={saveDisabledTitle}
            onclick={handleSave}
        ></lightning-button>
    </lightning-modal-footer>
</template>
