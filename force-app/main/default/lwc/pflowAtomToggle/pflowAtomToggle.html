<template>
    <div class={cbClass}>
        <lightning-input
            type="toggle"
            label={label}
            name={name}
            data-name={name}
            variant={variant}
            field-level-help={fieldLevelHelp}
            message-toggle-active={messageToggleActive}
            message-toggle-inactive={messageToggleInactive}
            checked={isChecked}
            disabled={disabled}
            onchange={handleToggle}
        ></lightning-input>
    </div>
</template>
