<template>
  <!-- ═══════════════ CHAPTER 03 · BEHAVIOR ═══════════════ -->
  <section class="pflow-chapter pflow-chapter_03" data-chapter="behavior">
    <aside class="pflow-chapter__mark" aria-hidden="true">
      <span class="pflow-chapter__numeral">03</span>
      <span class="pflow-chapter__rule"></span>
    </aside>
    <header class="pflow-chapter__head">
      <p class="pflow-chapter__eyebrow">Chapter · Behavior</p>
      <h2 class="pflow-chapter__title">How users interact</h2>
    </header>
  </section>
  <template lwc:if={hasDataSource}>
    <!-- CARD · Selection behavior -->
    <article class="slds-card pflow-studio__card">
      <header class="slds-card__header pflow-card__head">
        <span
          class="pflow-card__glyph pflow-card__glyph_behavior"
          aria-hidden="true"
        >
          <c-pflow-atom-icon
            name="check"
            size="small"
            alternative-text=""
          ></c-pflow-atom-icon>
        </span>
        <div class="pflow-card__headings">
          <h3 class="slds-card__header-title slds-text-heading_small">
            Selection behavior
          </h3>
          <p
            class="slds-card__header-subtitle slds-text-body_small slds-text-color_weak"
          >
            Choose how users pick and what validation applies.
          </p>
        </div>
        <lightning-helptext
          class="pflow-card__help"
          content="Single = exactly one option. Multi = any number within min/max. Auto-advance only works in single mode. A custom error message replaces the default validation message."
        ></lightning-helptext>
      </header>
      <div
        class="slds-card__body slds-card__body_inner pflow-studio__field-block"
      >
        <div class="pflow-studio__axis">
          <div class="pflow-studio__axis-head">
            <c-pflow-atom-icon
              name="check"
              size="x-small"
              alternative-text=""
            ></c-pflow-atom-icon>
            <div class="pflow-studio__axis-text">
              <p class="pflow-studio__axis-title">Mode</p>
              <p class="pflow-studio__axis-sub">
                Does the user pick one option, or several?
              </p>
            </div>
          </div>
          <div
            class="pflow-studio__pickgroup"
            role="radiogroup"
            aria-label="Selection mode"
            oncardselect={handleSelectionTileChange}
          >
            <template for:each={selectionTiles} for:item="tile">
              <c-pflow-atom-visual-pick
                key={tile.value}
                item={tile}
                selected={tile._selected}
                selection-mode="single"
                group-name="pflow-selection"
                size="small"
                aspect-ratio="1:1"
              ></c-pflow-atom-visual-pick>
            </template>
          </div>
        </div>

        <div class="pflow-studio__axis">
          <div
            class="pflow-studio__axis-head pflow-studio__axis-head_with-action"
          >
            <c-pflow-atom-icon
              name="list-filter"
              size="x-small"
              alternative-text=""
            ></c-pflow-atom-icon>
            <div class="pflow-studio__axis-text">
              <p class="pflow-studio__axis-title">Rules</p>
              <p class="pflow-studio__axis-sub">
                Set required validation, limits, and flow advancement.
              </p>
            </div>
            <span class="pflow-studio__axis-action">
              <c-pflow-atom-toggle
                label="Required"
                variant="label-hidden"
                active-label="Required"
                inactive-label="Optional"
                checked={_config.required}
                data-key="required"
                ontoggle={handleToggleChange}
              ></c-pflow-atom-toggle>
            </span>
          </div>
          <div class="pflow-studio__field-block">
            <template lwc:if={isMultiSelect}>
              <div class="pflow-studio__field-grid">
                <lightning-input
                  type="number"
                  label="Minimum selections"
                  value={_config.minSelections}
                  min="0"
                  onchange={handleMinChange}
                ></lightning-input>
                <lightning-input
                  type="number"
                  label="Maximum selections"
                  placeholder="Unlimited"
                  value={_config.maxSelections}
                  min="1"
                  onchange={handleMaxChange}
                ></lightning-input>
              </div>
            </template>
            <template lwc:if={_config.required}>
              <c-pflow-organism-resource-picker
                name="customErrorMessage"
                label="Custom error message (optional)"
                value={_config.customErrorMessage}
                builder-context={builderContext}
                automatic-output-variables={automaticOutputVariables}
                builder-context-filter-type="String"
                allow-hard-code-reference
                onvaluechanged={handleErrorMessageChange}
              ></c-pflow-organism-resource-picker>
            </template>
            <template lwc:if={isSingleSelect}>
              <c-pflow-atom-toggle
                label="Auto-advance the flow on selection"
                active-label="Auto"
                inactive-label="Manual"
                checked={_config.autoAdvance}
                data-key="autoAdvance"
                field-level-help="Fires Flow Next the moment a user picks a tile."
                ontoggle={handleToggleChange}
              ></c-pflow-atom-toggle>
            </template>
          </div>
        </div>
      </div>
    </article>

    <!-- CARD · None option -->
    <template lwc:if={isNoneOptionAvailable}>
      <article class="slds-card pflow-studio__card">
        <header
          class="slds-card__header pflow-card__head pflow-card__head_with-action"
        >
          <span
            class="pflow-card__glyph pflow-card__glyph_behavior"
            aria-hidden="true"
          >
            <c-pflow-atom-icon
              name="circle-x"
              size="small"
              alternative-text=""
            ></c-pflow-atom-icon>
          </span>
          <div class="pflow-card__headings">
            <h3 class="slds-card__header-title slds-text-heading_small">
              None option
            </h3>
            <p
              class="slds-card__header-subtitle slds-text-body_small slds-text-color_weak"
            >
              Let users clear their selection with a dedicated tile.
            </p>
          </div>
          <span class="pflow-card__action">
            <c-pflow-atom-toggle
              label="Include a --None-- option"
              variant="label-hidden"
              active-label="Include"
              inactive-label="No none"
              checked={noneOptionValue}
              data-key="includeNoneOption"
              ontoggle={handleToggleChange}
            ></c-pflow-atom-toggle>
          </span>
          <lightning-helptext
            class="pflow-card__help"
            content="Adds an empty-value choice so users can clear the picker in any layout."
          ></lightning-helptext>
        </header>
        <div
          class="slds-card__body slds-card__body_inner pflow-studio__field-block"
        >
          <template lwc:if={noneOptionValue}>
            <lightning-input
              type="text"
              label="None option label"
              value={noneOptionLabelValue}
              placeholder="--None--"
              disabled={isNoneOptionLabelDisabled}
              onchange={handleNoneOptionLabelChange}
            ></lightning-input>
            <div class="pflow-studio__field" aria-label="None option position">
              <p class="pflow-studio__field-label">Position</p>
              <div
                class="pflow-studio__pickgroup"
                role="radiogroup"
                aria-label="None option position"
                oncardselect={handleNoneOptionPositionChange}
              >
                <template for:each={noneOptionPositionTiles} for:item="tile">
                  <c-pflow-atom-visual-pick
                    key={tile.value}
                    item={tile}
                    selected={tile._selected}
                    disabled={tile._disabled}
                    selection-mode="single"
                    group-name="pflow-none-pos"
                    size="small"
                  ></c-pflow-atom-visual-pick>
                </template>
              </div>
            </div>
          </template>
        </div>
      </article>
    </template>

    <!-- CARD · Manual input -->
    <article class="slds-card pflow-studio__card">
      <header
        class="slds-card__header pflow-card__head pflow-card__head_with-action"
      >
        <span
          class="pflow-card__glyph pflow-card__glyph_behavior"
          aria-hidden="true"
        >
          <c-pflow-atom-icon
            name="square-pen"
            size="small"
            alternative-text=""
          ></c-pflow-atom-icon>
        </span>
        <div class="pflow-card__headings">
          <h3 class="slds-card__header-title slds-text-heading_small">
            Manual input
          </h3>
          <p
            class="slds-card__header-subtitle slds-text-body_small slds-text-color_weak"
          >
            Let users enter free text as an additional choice.
          </p>
        </div>
        <span class="pflow-card__action">
          <c-pflow-atom-toggle
            label="Allow manual input"
            variant="label-hidden"
            active-label="Manual"
            inactive-label="No manual"
            checked={manualInputValue}
            ontoggle={handleManualInputToggle}
          ></c-pflow-atom-toggle>
        </span>
        <lightning-helptext
          class="pflow-card__help"
          content="Adds an Other-style choice to every picker layout. When selected, the entered text is returned through the picker value output."
        ></lightning-helptext>
      </header>
      <div
        class="slds-card__body slds-card__body_inner pflow-studio__field-block"
      >
        <template lwc:if={manualInputValue}>
          <lightning-input
            type="text"
            label="Manual option label"
            value={manualInputLabelValue}
            placeholder="Other"
            disabled={isManualInputDisabled}
            onchange={handleManualInputLabelChange}
          ></lightning-input>
          <div class="pflow-studio__field-grid">
            <lightning-input
              type="number"
              label="Minimum characters"
              value={manualInputMinLengthValue}
              min="0"
              disabled={isManualInputDisabled}
              onchange={handleManualInputMinLengthChange}
            ></lightning-input>
            <lightning-input
              type="number"
              label="Maximum characters"
              placeholder="Unlimited"
              value={manualInputMaxLengthValue}
              min="1"
              disabled={isManualInputDisabled}
              onchange={handleManualInputMaxLengthChange}
            ></lightning-input>
          </div>
        </template>
      </div>
    </article>

    <!-- CARD · Search & toolbar -->
    <article class="slds-card pflow-studio__card">
      <header
        class="slds-card__header pflow-card__head pflow-card__head_with-action"
      >
        <span
          class="pflow-card__glyph pflow-card__glyph_behavior"
          aria-hidden="true"
        >
          <c-pflow-atom-icon
            name="search"
            size="small"
            alternative-text=""
          ></c-pflow-atom-icon>
        </span>
        <div class="pflow-card__headings">
          <h3 class="slds-card__header-title slds-text-heading_small">
            Search &amp; toolbar
          </h3>
          <p
            class="slds-card__header-subtitle slds-text-body_small slds-text-color_weak"
          >
            Extra controls users can use to filter and bulk-select.
          </p>
        </div>
        <span class="pflow-card__action">
          <c-pflow-atom-toggle
            label="Show a search filter"
            variant="label-hidden"
            active-label="Search"
            inactive-label="No search"
            checked={_config.enableSearch}
            data-key="enableSearch"
            ontoggle={handleToggleChange}
          ></c-pflow-atom-toggle>
        </span>
        <lightning-helptext
          class="pflow-card__help"
          content="Search appears where it fits the selected layout: above card groups, inside picklists, and inside transfer panels. The Select-all / Clear-all toolbar appears only in multi mode."
        ></lightning-helptext>
      </header>
      <div
        class="slds-card__body slds-card__body_inner pflow-studio__field-block"
      >
        <template lwc:if={isMultiSelect}>
          <c-pflow-atom-toggle
            label="Show Select all / Clear all toolbar"
            active-label="Bulk"
            inactive-label="No bulk"
            checked={_config.showSelectAll}
            data-key="showSelectAll"
            ontoggle={handleToggleChange}
          ></c-pflow-atom-toggle>
        </template>
      </div>
    </article>
  </template>
</template>
