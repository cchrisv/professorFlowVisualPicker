<template>
    <c-pflow-molecule-custom-lookup
        label="Order By"
        placeholder="Default: Last Modified"
        variant="label-stacked"
        selection={orderByFieldSelection}
        disabled={disabled}
        min-search-term-length="0"
        scroll-after-n-items="7"
        onsearch={handleFieldSearch}
        onselectionchange={handleFieldSelectionChange}
        class="slds-m-bottom_x-small"
    ></c-pflow-molecule-custom-lookup>

    <lightning-combobox
        label="Direction"
        value={orderByDirection}
        options={directionOptions}
        disabled={disabled}
        onchange={handleDirectionChange}
        class="slds-m-bottom_x-small"
    ></lightning-combobox>

    <lightning-input
        type="number"
        label="Limit (optional)"
        value={queryLimit}
        placeholder="No limit"
        min="1"
        max="2000"
        disabled={disabled}
        onchange={handleLimitChange}
        field-level-help="Maximum results returned (1-2000). Leave empty for no limit."
    ></lightning-input>
</template>
