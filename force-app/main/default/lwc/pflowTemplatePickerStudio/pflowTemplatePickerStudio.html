<template>
  <div class="pflow-studio" style={gridStyle}>
    <aside class="pflow-studio__left" aria-label="Navigation and preview">
      <nav class="pflow-studio__nav" aria-label="Configuration sections">
        <template for:each={sections} for:item="section">
          <button
            key={section.key}
            type="button"
            class={section.buttonClass}
            data-key={section.key}
            data-chapter={section.key}
            aria-current={section.ariaCurrent}
            onclick={handleSectionClick}
          >
            <span class="pflow-studio__nav-stripe" aria-hidden="true"></span>
            <span class="pflow-studio__nav-numeral" aria-hidden="true"
              >{section.numeral}</span
            >
            <span class="pflow-studio__nav-glyph" aria-hidden="true">
              <c-pflow-atom-icon
                name={section.icon}
                size="x-small"
                alternative-text=""
              ></c-pflow-atom-icon>
            </span>
            <span class="pflow-studio__nav-label">{section.label}</span>
            <template lwc:if={section.showStatus}>
              <span class={section.statusClass} aria-hidden="true"></span>
            </template>
          </button>
        </template>
      </nav>

      <slot name="preview"></slot>
    </aside>

    <div
      class="pflow-studio__splitter"
      role="separator"
      aria-orientation="vertical"
      aria-label="Resize left panel"
      aria-valuemin="240"
      aria-valuemax="520"
      aria-valuenow={leftAriaValueNow}
      tabindex="0"
      onpointerdown={handleSplitterPointerDown}
      onpointermove={handleSplitterPointerMove}
      onpointerup={handleSplitterPointerUp}
      onpointercancel={handleSplitterPointerUp}
      onkeydown={handleSplitterKeyDown}
    >
      <span class="pflow-studio__splitter-grip" aria-hidden="true"></span>
    </div>

    <section class="pflow-studio__controls">
      <slot name="controls" onslotchange={handleControlsSlotChange}></slot>
    </section>
  </div>
</template>
