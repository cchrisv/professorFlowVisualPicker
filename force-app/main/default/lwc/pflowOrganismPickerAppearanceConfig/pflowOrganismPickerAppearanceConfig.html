                onchange={handlePatternToneHexChange}
                aria-label="Hex color value"

    <template lwc:if={showBadgeGroupCards}>
      <template lwc:if={showBadgeCard}>
        <article class="slds-card pflow-studio__card pflow-badge-card">
          <header class="slds-card__header pflow-card__head">
            <span
              class="pflow-card__glyph pflow-card__glyph_appearance"
              aria-hidden="true"
            >
              <c-pflow-atom-icon
                name="award"
                size="small"
                alternative-text=""
              ></c-pflow-atom-icon>
            </span>
            <div class="pflow-card__headings">
              <h3 class="slds-card__header-title slds-text-heading_small">
                Badge
              </h3>
              <p
                class="slds-card__header-subtitle slds-text-body_small slds-text-color_weak"
              >
                Highlight a tile with a short status label.
              </p>
            </div>
            <lightning-helptext
              class="pflow-card__help"
              content="Badge text comes from your data (the badge field). Position, color, and shape are global settings applied to every tile. Per-item overrides are supported via item.badgeVariant."
            ></lightning-helptext>
          </header>
          <div
            class="slds-card__body slds-card__body_inner pflow-badge-card__body"
          >
            <!-- Position -->
            <div class="pflow-badge-card__control">
              <span class="pflow-badge-card__eyebrow">Position</span>
              <div
                class="pflow-badge-card__pos-row"
                role="radiogroup"
                aria-label="Badge position"
              >
                <template for:each={badgePositionChips} for:item="chip">
                  <button
                    key={chip.value}
                    type="button"
                    class={chip.className}
                    data-value={chip.value}
                    onclick={handleBadgePositionChange}
                    role="radio"
                    aria-checked={chip._selected}
                    title={chip.label}
                  >
                    <span class="pflow-badge-pos-chip__canvas">
                      <span class={chip.dotClass}></span>
                    </span>
                    <span class="pflow-badge-pos-chip__label"
                      >{chip.label}</span
                    >
                  </button>
                </template>
              </div>
            </div>

            <!-- Variant -->
            <div class="pflow-badge-card__control">
              <span class="pflow-badge-card__eyebrow">Color</span>
              <div
                class="pflow-tone-row"
                role="radiogroup"
                aria-label="Badge color"
              >
                <template for:each={badgeVariantChips} for:item="chip">
                  <button
                    key={chip.value}
                    type="button"
                    class={chip.className}
                    data-value={chip.value}
                    aria-pressed={chip.ariaPressed}
                    title={chip.label}
                    disabled={chip.disabled}
                    onclick={handleBadgeVariantChange}
                  >
                    <span class={chip.dotClassName} aria-hidden="true"></span>
                    <span class="pflow-tone-chip__label">{chip.label}</span>
                  </button>
                </template>
              </div>
              <template lwc:if={badgeVariantIsCustom}>
                <div class="pflow-hex-row">
                  <label class="pflow-hex-row__label" for="badge-variant-hex"
                    >Custom color</label
                  >
                  <input
                    id="badge-variant-hex"
                    type="color"
                    class="pflow-hex-row__picker"
                    value={badgeVariantHexValue}
                    oninput={handleBadgeVariantHexChange}
                    onchange={handleBadgeVariantHexChange}
                    aria-label="Pick badge color"
                  />
                  <input
                    type="text"
                    class="pflow-hex-row__input"
                    value={badgeVariantHexValue}
                    placeholder="#3baa6f"
                    onchange={handleBadgeVariantHexChange}
                    aria-label="Hex color value"
                  />
                </div>
              </template>
            </div>

            <!-- Shape -->
            <div class="pflow-badge-card__control">
              <span class="pflow-badge-card__eyebrow">Shape</span>
              <div
                class="pflow-badge-card__shape-row"
                role="radiogroup"
                aria-label="Badge shape"
              >
                <template for:each={badgeShapeChips} for:item="chip">
                  <button
                    key={chip.value}
                    type="button"
                    class={chip.className}
                    data-value={chip.value}
                    onclick={handleBadgeShapeChange}
                    role="radio"
                    title={chip.label}
                  >
                    <span class={chip.badgeClass}>Sample</span>
                    <span class="pflow-badge-shape-chip__label"
                      >{chip.label}</span
                    >
                  </button>
                </template>
              </div>
            </div>
          </div>
        </article>
      </template>
    </template>

    <!-- ▂▂▂▂ SPACING & RHYTHM — selection + gaps + margins ▂▂▂▂ -->
    <template lwc:if={isTileLayout}>
      <div
        class="pflow-studio__subchapter"
        role="separator"
        aria-label="Spacing and rhythm"
      >
        <span class="pflow-studio__subchapter-eyebrow">
          <span class="pflow-studio__subchapter-numeral">04·E</span>
          <span class="pflow-studio__subchapter-title"
            >Spacing &amp; rhythm</span
          >
        </span>
        <span class="pflow-studio__subchapter-rule" aria-hidden="true"></span>
        <span></span>
      </div>
    </template>

    <!-- ═════════════════ SELECTION INDICATOR (moved into SPACING) ═════════════════ -->
    <template lwc:if={showSelectionIndicator}>
      <article class="slds-card pflow-studio__card">
        <header class="slds-card__header pflow-card__head">
          <span
            class="pflow-card__glyph pflow-card__glyph_appearance"
            aria-hidden="true"
          >
            <c-pflow-atom-icon
              name="check"
              size="small"
              alternative-text=""
            ></c-pflow-atom-icon>
          </span>
          <div class="pflow-card__headings">
            <h3 class="slds-card__header-title slds-text-heading_small">
              Selection indicator
            </h3>
            <p
              class="slds-card__header-subtitle slds-text-body_small slds-text-color_weak"
            >
              How a picked tile shows its selected state.
            </p>
          </div>
          <lightning-helptext
            class="pflow-card__help"
            content="Checkmark shows a floating circle badge. Fill flips the tile surface to brand color. Bar draws a thick accent edge (left in grid, bottom in list)."
          ></lightning-helptext>
        </header>
        <div class="slds-card__body slds-card__body_inner">
          <div
            class="pflow-studio__pickgroup"
            role="radiogroup"
            aria-label="Selection indicator"
            oncardselect={handleSelectionIndicatorChange}
          >
            <template for:each={selectionIndicatorTiles} for:item="tile">
              <c-pflow-atom-visual-pick
                key={tile.value}
                item={tile}
                selected={tile._selected}
                selection-mode="single"
                group-name="pflow-selindicator"
                size="small"
                aspect-ratio="1:1"
                selection-indicator={tile.value}
              ></c-pflow-atom-visual-pick>
            </template>
          </div>
        </div>
      </article>
    </template>

    <template lwc:if={showGridMinWidth}>
      <article class="slds-card pflow-studio__card">
        <header class="slds-card__header pflow-card__head">
          <span
            class="pflow-card__glyph pflow-card__glyph_appearance"
            aria-hidden="true"
          >
            <c-pflow-atom-icon
              name="battery-medium"
              size="small"
              alternative-text=""
            ></c-pflow-atom-icon>
          </span>
          <div class="pflow-card__headings">
            <h3 class="slds-card__header-title slds-text-heading_small">
              Grid density
            </h3>
            <p
              class="slds-card__header-subtitle slds-text-body_small slds-text-color_weak"
            >
              Override the grid column width. Picking a size above sets this
              automatically.
            </p>
          </div>
          <lightning-helptext
            class="pflow-card__help"
            content="By default the grid column width is bound to the Tile size. Drag the slider to override — smaller values pack more tiles per row, larger values spread them out."
          ></lightning-helptext>
        </header>
        <div
          class="slds-card__body slds-card__body_inner pflow-studio__slider-stack"
        >
          <div class="pflow-studio__slider">
            <div class="pflow-studio__slider-head">
              <span class="pflow-studio__slider-label"
                >Minimum column width</span
              >
              <span class="pflow-studio__slider-value"
                >{gridMinWidthDisplay}</span
              >
            </div>
            <lightning-input
              type="range"
              variant="label-hidden"
              label="Minimum column width"
              min={gridMinWidthRange.min}
              max={gridMinWidthRange.max}
              step={gridMinWidthRange.step}
              value={gridMinWidthNumber}
              onchange={handleGridMinWidthChange}
            ></lightning-input>
            <div class="pflow-studio__slider-scale">
              <span>{gridMinWidthScaleMin}</span>
              <span>{gridMinWidthScaleMax}</span>
            </div>
          </div>
        </div>
      </article>
    </template>

    <template lwc:if={showGapCard}>
      <article class="slds-card pflow-studio__card">
        <header class="slds-card__header pflow-card__head">
          <span
            class="pflow-card__glyph pflow-card__glyph_appearance"
            aria-hidden="true"
          >
            <c-pflow-atom-icon
              name="rows-3"
              size="small"
              alternative-text=""
            ></c-pflow-atom-icon>
          </span>
          <div class="pflow-card__headings">
            <h3 class="slds-card__header-title slds-text-heading_small">
              Tile gaps
            </h3>
            <p
              class="slds-card__header-subtitle slds-text-body_small slds-text-color_weak"
            >
              Space between tiles.
            </p>
          </div>
          <lightning-helptext
            class="pflow-card__help"
            content="Each chip maps to an SLDS 2 spacing token. Horizontal controls column gap (side-by-side tiles); vertical controls row gap (stacked rows)."
          ></lightning-helptext>
        </header>
        <div
          class="slds-card__body slds-card__body_inner pflow-studio__field-block"
        >
          <template lwc:if={showGapHorizontal}>
            <div class="pflow-studio__axis">
              <div class="pflow-studio__axis-head">
                <c-pflow-atom-icon
                  name="move-horizontal"
                  size="x-small"
                  alternative-text=""
                ></c-pflow-atom-icon>
                <div class="pflow-studio__axis-text">
                  <h4 class="pflow-studio__axis-title">Horizontal</h4>
                  <p class="pflow-studio__axis-sub">
                    Column gap between tiles.
                  </p>
                </div>
              </div>
              <div
                class="pflow-studio__pickgroup pflow-studio__pickgroup_compact"
                role="radiogroup"
                aria-label="Horizontal gap"
                oncardselect={handleGapHorizontalToken}
              >
                <template for:each={gapHTiles} for:item="tile">
                  <c-pflow-atom-visual-pick
                    key={tile.id}
                    item={tile}
                    selected={tile._selected}
                    selection-mode="single"
                    group-name="pflow-gap-h"
                    size="small"
                    aspect-ratio="3:4"
                    icon-size="small"
                  ></c-pflow-atom-visual-pick>
                </template>
              </div>
            </div>
          </template>
          <template lwc:if={showGapVertical}>
            <div class="pflow-studio__axis">
              <div class="pflow-studio__axis-head">
                <c-pflow-atom-icon
                  name="move-vertical"
                  size="x-small"
                  alternative-text=""
                ></c-pflow-atom-icon>
                <div class="pflow-studio__axis-text">
                  <h4 class="pflow-studio__axis-title">Vertical</h4>
                  <p class="pflow-studio__axis-sub">Row gap between tiles.</p>
                </div>
              </div>
              <div
                class="pflow-studio__pickgroup pflow-studio__pickgroup_compact"
                role="radiogroup"
                aria-label="Vertical gap"
                oncardselect={handleGapVerticalToken}
              >
                <template for:each={gapVTiles} for:item="tile">
                  <c-pflow-atom-visual-pick
                    key={tile.id}
                    item={tile}
                    selected={tile._selected}
                    selection-mode="single"
                    group-name="pflow-gap-v"
                    size="small"
                    aspect-ratio="3:4"
                    icon-size="small"
                  ></c-pflow-atom-visual-pick>
                </template>
              </div>
            </div>
          </template>
        </div>
      </article>
    </template>

    <template lwc:if={showMarginPadding}>
      <article class="slds-card pflow-studio__card">
        <header class="slds-card__header pflow-card__head">
          <span
            class="pflow-card__glyph pflow-card__glyph_appearance"
            aria-hidden="true"
          >
            <c-pflow-atom-icon
              name="expand"
              size="small"
              alternative-text=""
            ></c-pflow-atom-icon>
          </span>
          <div class="pflow-card__headings">
            <h3 class="slds-card__header-title slds-text-heading_small">
              Outer margin
            </h3>
            <p
              class="slds-card__header-subtitle slds-text-body_small slds-text-color_weak"
            >
              Space around the whole picker at runtime.
            </p>
          </div>
          <lightning-helptext
            class="pflow-card__help"
            content="Link all sides to set one value, or unlink for per-side control. Each side maps to an SLDS 2 spacing token."
          ></lightning-helptext>
        </header>
        <div
          class="slds-card__body slds-card__body_inner pflow-studio__field-block"
        >
          <c-pflow-atom-toggle
            label="Link all sides"
            message-toggle-active="All four sides share one value"
            message-toggle-inactive="Set each side independently"
            checked={marginLinked}
            ontoggle={handleMarginLinkToggle}
          ></c-pflow-atom-toggle>
          <template lwc:if={marginLinked}>
            <div
              class="pflow-studio__pickgroup pflow-studio__pickgroup_compact"
              role="radiogroup"
              aria-label="Margin — all sides"
              oncardselect={handleMarginAllChange}
            >
              <template for:each={marginAllTiles} for:item="tile">
                <c-pflow-atom-visual-pick
                  key={tile.id}
                  item={tile}
                  selected={tile._selected}
                  selection-mode="single"
                  group-name="pflow-margin-all"
                  size="small"
                  aspect-ratio="3:4"
                  icon-size="small"
                ></c-pflow-atom-visual-pick>
              </template>
            </div>
          </template>
          <template lwc:else>
            <template for:each={marginSideSections} for:item="section">
              <div
                key={section.side}
                class="pflow-studio__axis"
                data-section-side={section.side}
              >
                <div class="pflow-studio__axis-head">
                  <c-pflow-atom-icon
                    name={section.icon}
                    size="x-small"
                    alternative-text=""
                  ></c-pflow-atom-icon>
                  <div class="pflow-studio__axis-text">
                    <h4 class="pflow-studio__axis-title">{section.label}</h4>
                  </div>
                </div>
                <div
                  class="pflow-studio__pickgroup pflow-studio__pickgroup_compact"
                  role="radiogroup"
                  aria-label={section.label}
                  data-side={section.side}
                  oncardselect={handleMarginSideChange}
                >
                  <template for:each={section.tiles} for:item="tile">
                    <c-pflow-atom-visual-pick
                      key={tile.id}
                      item={tile}
                      selected={tile._selected}
                      selection-mode="single"
                      group-name="pflow-margin-side"
                      size="small"
                      aspect-ratio="1:1"
                      icon-size="small"
                    ></c-pflow-atom-visual-pick>
                  </template>
                </div>
              </div>
            </template>
          </template>
        </div>
      </article>

      <article class="slds-card pflow-studio__card">
        <header class="slds-card__header pflow-card__head">
          <span
            class="pflow-card__glyph pflow-card__glyph_appearance"
            aria-hidden="true"
          >
            <c-pflow-atom-icon
              name="shrink"
              size="small"
              alternative-text=""
            ></c-pflow-atom-icon>
          </span>
          <div class="pflow-card__headings">
            <h3 class="slds-card__header-title slds-text-heading_small">
              Inner tile padding
            </h3>
            <p
              class="slds-card__header-subtitle slds-text-body_small slds-text-color_weak"
            >
              Space inside each tile between its border and content.
            </p>
          </div>
          <lightning-helptext
            class="pflow-card__help"
            content="Padding drives the content gap too — the space between icon and text is always half the padding. Pick Auto to follow the tile size's default."
          ></lightning-helptext>
        </header>
        <div
          class="slds-card__body slds-card__body_inner pflow-studio__field-block"
        >
          <c-pflow-atom-toggle
            label="Link all sides"
            message-toggle-active="All four sides share one value"
            message-toggle-inactive="Set each side independently"
            checked={paddingLinked}
            ontoggle={handlePaddingLinkToggle}
          ></c-pflow-atom-toggle>
          <template lwc:if={paddingLinked}>
            <div
              class="pflow-studio__pickgroup pflow-studio__pickgroup_compact"
              role="radiogroup"
              aria-label="Padding — all sides"
              oncardselect={handlePaddingAllChange}
            >
              <template for:each={paddingAllTiles} for:item="tile">
                <c-pflow-atom-visual-pick
                  key={tile.id}
                  item={tile}
                  selected={tile._selected}
                  selection-mode="single"
                  group-name="pflow-padding-all"
                  size="small"
                  aspect-ratio="3:4"
                  icon-size="small"
                ></c-pflow-atom-visual-pick>
              </template>
            </div>
          </template>
          <template lwc:else>
            <template for:each={paddingSideSections} for:item="section">
              <div
                key={section.side}
                class="pflow-studio__axis"
                data-section-side={section.side}
              >
                <div class="pflow-studio__axis-head">
                  <c-pflow-atom-icon
                    name={section.icon}
                    size="x-small"
                    alternative-text=""
                  ></c-pflow-atom-icon>
                  <div class="pflow-studio__axis-text">
                    <h4 class="pflow-studio__axis-title">{section.label}</h4>
                  </div>
                </div>
                <div
                  class="pflow-studio__pickgroup pflow-studio__pickgroup_compact"
                  role="radiogroup"
                  aria-label={section.label}
                  data-side={section.side}
                  oncardselect={handlePaddingSideChange}
                >
                  <template for:each={section.tiles} for:item="tile">
                    <c-pflow-atom-visual-pick
                      key={tile.id}
                      item={tile}
                      selected={tile._selected}
                      selection-mode="single"
                      group-name="pflow-padding-side"
                      size="small"
                      aspect-ratio="1:1"
                      icon-size="small"
                    ></c-pflow-atom-visual-pick>
                  </template>
                </div>
              </div>
            </template>
          </template>
        </div>
      </article>
    </template>
  </template>
</template>
