<template>
  <div class="pflow-studio__preview" aria-label="Live preview">
    <header class="pflow-studio__preview-head">
      <div class="pflow-studio__preview-head-text">
        <p class="slds-text-title_caps pflow-studio__eyebrow">Live preview</p>
        <h3 class="slds-text-heading_small pflow-studio__preview-title">
          {previewLayoutLabel} · {previewSelectionLabel}
        </h3>
      </div>
      <div
        class="pflow-studio__preview-states"
        role="tablist"
        aria-label="Preview rendering state"
      >
        <template for:each={previewStateButtons} for:item="btn">
          <button
            key={btn.state}
            type="button"
            role="tab"
            class={btn.className}
            data-state={btn.state}
            aria-selected={btn.ariaPressed}
            aria-pressed={btn.ariaPressed}
            onclick={handlePreviewStateChange}
          >
            <c-pflow-atom-icon
              name={btn.icon}
              size="xx-small"
              box="button"
              alternative-text=""
            ></c-pflow-atom-icon>
            <span>{btn.label}</span>
          </button>
        </template>
      </div>
    </header>

    <div class="pflow-studio__preview-frame">
      <template lwc:if={previewEmpty}>
        <div class="pflow-studio__preview-empty">
          <c-pflow-atom-icon
            name="eye"
            size="small"
            box="tile"
            alternative-text=""
          ></c-pflow-atom-icon>
          <p class="slds-text-body_regular slds-text-color_weak">
            Pick a data source to see your picker come to life.
          </p>
        </div>
      </template>
      <template lwc:elseif={showLivePreview}>
        <c-pflow-organism-data-picker
          label={c.label}
          help-text={c.helpText}
          field-level-help={c.fieldLevelHelp}
          forced-state={forcedState}
          source-type={c.dataSource}
          layout={c.layout}
          selection-mode={c.selectionMode}
          required={c.required}
          min-selections={c.minSelections}
          max-selections={c.maxSelections}
          picklist-config={organismPicklistConfig}
          sobject-config={organismSobjectConfig}
          custom-config={organismCustomConfig}
          string-collection-config={organismStringCollectionConfig}
          overrides={organismOverrides}
          display-config={organismDisplayConfig}
          enable-search={c.enableSearch}
          show-select-all={c.showSelectAll}
          include-none-option={noneOptionValue}
          none-option-label={noneOptionLabelValue}
          none-option-position={noneOptionPositionValue}
          allow-manual-input={manualInputValue}
          manual-input-label={manualInputLabelValue}
          manual-input-min-length={manualInputMinLengthValue}
          manual-input-max-length={manualInputMaxLengthValue}
          grid-min-width={orgGridMinWidth}
          gap-horizontal={orgGapHorizontal}
          gap-vertical={orgGapVertical}
          margin-top={orgMarginTop}
          margin-right={orgMarginRight}
          margin-bottom={orgMarginBottom}
          margin-left={orgMarginLeft}
          padding-top={orgPaddingTop}
          padding-right={orgPaddingRight}
          padding-bottom={orgPaddingBottom}
          padding-left={orgPaddingLeft}
          size={orgSize}
          aspect-ratio={orgAspectRatio}
          badge-position={orgBadgePosition}
          badge-variant={orgBadgeVariant}
          badge-shape={orgBadgeShape}
          columns={orgColumns}
          selection-indicator={orgSelectionIndicator}
          elevation={orgElevation}
          pattern={orgPattern}
          pattern-tone={orgPatternTone}
          pattern-hover-tone={orgPatternHoverTone}
          pattern-selected-tone={orgPatternSelectedTone}
          pattern-disabled-tone={orgPatternDisabledTone}
          corner-style={orgCornerStyle}
          corner-tone={orgCornerTone}
          surface-style={orgSurfaceStyle}
          surface-tone={orgSurfaceTone}
          surface-hover-tone={orgSurfaceHoverTone}
          surface-selected-tone={orgSurfaceSelectedTone}
          surface-disabled-tone={orgSurfaceDisabledTone}
          icon-decor={orgIconDecor}
          icon-style={orgIconStyle}
          icon-shading={orgIconShading}
          icon-tone={orgIconTone}
          icon-tone-hex={orgIconToneHex}
          pattern-tone-hex={orgPatternToneHex}
          pattern-hover-tone-hex={orgPatternHoverToneHex}
          pattern-selected-tone-hex={orgPatternSelectedToneHex}
          pattern-disabled-tone-hex={orgPatternDisabledToneHex}
          corner-tone-hex={orgCornerToneHex}
          surface-tone-hex={orgSurfaceToneHex}
          surface-hover-tone-hex={orgSurfaceHoverToneHex}
          surface-selected-tone-hex={orgSurfaceSelectedToneHex}
          surface-disabled-tone-hex={orgSurfaceDisabledToneHex}
          badge-variant-hex={orgBadgeVariantHex}
          icon-glyph-tone={orgIconGlyphTone}
          icon-glyph-tone-hex={orgIconGlyphToneHex}
          icon-size={orgIconSize}
          show-icons={orgShowIcons}
          show-badges={orgShowBadges}
          preview-mode="true"
          empty-state-message={c.emptyStateMessage}
          error-state-message={c.errorStateMessage}
        ></c-pflow-organism-data-picker>
      </template>
      <template lwc:elseif={showFallbackPreview}>
        <c-pflow-organism-data-picker
          label={c.label}
          help-text={c.helpText}
          field-level-help={c.fieldLevelHelp}
          forced-state={forcedState}
          source-type="custom"
          layout={c.layout}
          selection-mode={c.selectionMode}
          required={c.required}
          min-selections={c.minSelections}
          max-selections={c.maxSelections}
          custom-config={fallbackCustomConfig}
          overrides={organismOverrides}
          display-config={organismDisplayConfig}
          show-select-all={c.showSelectAll}
          enable-search={c.enableSearch}
          include-none-option={noneOptionValue}
          none-option-label={noneOptionLabelValue}
          none-option-position={noneOptionPositionValue}
          allow-manual-input={manualInputValue}
          manual-input-label={manualInputLabelValue}
          manual-input-min-length={manualInputMinLengthValue}
          manual-input-max-length={manualInputMaxLengthValue}
          grid-min-width={orgGridMinWidth}
          gap-horizontal={orgGapHorizontal}
          gap-vertical={orgGapVertical}
          margin-top={orgMarginTop}
          margin-right={orgMarginRight}
          margin-bottom={orgMarginBottom}
          margin-left={orgMarginLeft}
          padding-top={orgPaddingTop}
          padding-right={orgPaddingRight}
          padding-bottom={orgPaddingBottom}
          padding-left={orgPaddingLeft}
          size={orgSize}
          aspect-ratio={orgAspectRatio}
          badge-position={orgBadgePosition}
          badge-variant={orgBadgeVariant}
          badge-shape={orgBadgeShape}
          columns={orgColumns}
          selection-indicator={orgSelectionIndicator}
          elevation={orgElevation}
          pattern={orgPattern}
          pattern-tone={orgPatternTone}
          pattern-hover-tone={orgPatternHoverTone}
          pattern-selected-tone={orgPatternSelectedTone}
          pattern-disabled-tone={orgPatternDisabledTone}
          corner-style={orgCornerStyle}
          corner-tone={orgCornerTone}
          surface-style={orgSurfaceStyle}
          surface-tone={orgSurfaceTone}
          surface-hover-tone={orgSurfaceHoverTone}
          surface-selected-tone={orgSurfaceSelectedTone}
          surface-disabled-tone={orgSurfaceDisabledTone}
          icon-decor={orgIconDecor}
          icon-style={orgIconStyle}
          icon-shading={orgIconShading}
          icon-tone={orgIconTone}
          icon-tone-hex={orgIconToneHex}
          pattern-tone-hex={orgPatternToneHex}
          pattern-hover-tone-hex={orgPatternHoverToneHex}
          pattern-selected-tone-hex={orgPatternSelectedToneHex}
          pattern-disabled-tone-hex={orgPatternDisabledToneHex}
          corner-tone-hex={orgCornerToneHex}
          surface-tone-hex={orgSurfaceToneHex}
          surface-hover-tone-hex={orgSurfaceHoverToneHex}
          surface-selected-tone-hex={orgSurfaceSelectedToneHex}
          surface-disabled-tone-hex={orgSurfaceDisabledToneHex}
          badge-variant-hex={orgBadgeVariantHex}
          icon-glyph-tone={orgIconGlyphTone}
          icon-glyph-tone-hex={orgIconGlyphToneHex}
          icon-size={orgIconSize}
          show-icons={orgShowIcons}
          show-badges={orgShowBadges}
          preview-mode="true"
          empty-state-message={c.emptyStateMessage}
          error-state-message={c.errorStateMessage}
        ></c-pflow-organism-data-picker>
      </template>
    </div>

    <template lwc:if={previewCaption}>
      <p
        class="pflow-studio__preview-caption slds-text-body_small slds-text-color_weak"
      >
        {previewCaption}
      </p>
    </template>
  </div>
</template>
